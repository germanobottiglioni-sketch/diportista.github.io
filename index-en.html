<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diportista | Your Digital Logbook</title>
  <meta name="description" content="Diportista is the app for boat owners: digital logbook, fuel tracking, costs, deadlines, charts, export and trip sharing." />

  <style>
    :root {
      --bg: #06111f;
      --text: #eef4ff;
      --muted: #a9b9d3;
      --line: rgba(133, 164, 210, 0.18);
      --blue: #4bb7ff;
      --gold: #f3c66b;
    }

    body {
      margin: 0;
      font-family: Inter, Arial;
      color: var(--text);
      background: #071120;
    }

    .container {
      width: 92%;
      max-width: 1200px;
      margin: auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      background: rgba(4, 11, 22, 0.9);
      padding: 15px 0;
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 1.4rem;
    }

    .brand img {
      width: 40px;
      border-radius: 10px;
    }

    .nav {
      display: flex;
      gap: 20px;
      color: var(--muted);
    }

    .nav a:hover { color: white; }

    /* LANGUAGE DROPDOWN */
    .lang-dropdown {
      position: relative;
    }

    .lang-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      padding: 8px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .lang-menu {
      position: absolute;
      top: 110%;
      right: 0;
      background: #0b1a2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      display: none;
      min-width: 180px;
      overflow: hidden;
    }

    .lang-menu a {
      display: block;
      padding: 10px 14px;
      color: #a9b9d3;
    }

    .lang-menu a:hover {
      background: rgba(255,255,255,0.05);
      color: white;
    }

    .lang-dropdown:hover .lang-menu {
      display: block;
    }

    .store-links {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-primary {
      background: white;
      color: black;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .hero {
      padding: 60px 0;
    }

    h1 {
      font-size: 2.8rem;
    }

    p {
      color: var(--muted);
      max-width: 600px;
    }
  </style>
</head>

<body>

<header class="topbar">
  <div class="container topbar-inner">

    <a href="index-en.html" class="brand">
      <img src="hero-postcard.png" alt="Diportista" />
      Diportista
    </a>

    <nav class="nav">
      <a href="#">Features</a>
      <a href="#">Preview</a>
      <a href="#">Benefits</a>
    </nav>

    <!-- LANGUAGE -->
    <div class="lang-dropdown">
      <button class="lang-btn">🇬🇧 EN ▾</button>
      <div class="lang-menu">
        <a href="index.html">🇮🇹 Italiano</a>
        <a href="index-en.html">🇬🇧 English</a>
        <a href="index-fr.html">🇫🇷 Français</a>
        <a href="index-es.html">🇪🇸 Español</a>
        <a href="index-pt.html">🇧🇷 Português</a>
      </div>
    </div>

    <div class="store-links">
      <a class="btn btn-primary" href="https://play.google.com/store/apps/details?id=it.germano.diportista&pli=1" target="_blank" rel="noopener noreferrer">Google Play</a>
      <a class="btn btn-secondary" href="https://apps.apple.com/it/app/diportista/id6759178080" target="_blank" rel="noopener noreferrer">App Store</a>
    </div>

  </div>
</header>

<section class="hero">
  <div class="container">
    <h1>Your Digital Boat Logbook</h1>
    <p>
      Track trips, fuel, costs and maintenance in one simple and powerful app.
    </p>
  </div>
</section>

</body>
</html>
